<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Week 4 Forms</title>
    </head>
    <body>
        <h1>Takeout Form</h1>
        <!--action attribute is where the form info will go-->
        <form action="" method="post">
            <label for="fullname">Full Name</label>
            <input type="text" name= "fullname" id="fullname">
            <br>
            <br>
            <label for="orderitem">Order Item</label>
            <input type="text" name= "orderitem" id="orderitem">
            <br>
            <br>
            <label for="specialrequests">Special Requests</label>
            <textarea name="specialrequests" id="specialrequests"></textarea>

            <p>Add Condimentes:</p>
            <label for="bbq">BBQ Sauce</label>
            <input type="checkbox" id="bbq" name="bbq">
            <label for="ketchup">Ketchup</label>
            <input type="checkbox" id="ketchup" name="ketchup">
            <br>
            <br>
            <label for="pickup">Pickup Time:</label>
            <select id="pickup" name="pickup">
                <option value="morning">morning</option>
                <option value="afternoon">afternoon</option>
                <option value="evening">evening</option>
            </select>
            <br>
            <p>How do you want to pay?</p>
            <input type="radio" id="instore" name="howpay">
            <label for="instore">Pay in Store</label><br>
            <input type="radio" id="online" name="howpay">
            <label for="online">Pay Online</label><br>  
            
            <!--input is a void tag-->
            <input type="submit" value="send order">
        </form>
    </body>
</html>
